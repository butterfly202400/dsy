name: Auto Backup (Every 12h Check)

on:
  schedule:
    # 每 12 小时检查一次 (北京时间 04:00 和 16:00 左右)
    - cron: '0 */12 * * *'
  workflow_dispatch: # 支持手动点击运行

jobs:
  backup-job:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须赋予写入权限

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史以确保 rebase 成功

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 运行备份脚本
        run: python auto_backup.py

      - name: 提交并推送更改
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 检查是否有内容变化（包括 backup_state.json 的更新）
          git add backup/
          if git diff --staged --quiet; then
            echo "脚本判断未到备份时间，仓库无变化。"
          else
            git commit -m "Auto Backup: $(date +'%Y-%m-%d %H:%M:%S') [skip ci]"
            # 关键步骤：先拉取再推送，防止冲突
            git pull --rebase origin main
            git push origin main
          fi
