name: Auto Backup (15-day interval)

on:
  schedule:
    # 北京时间每天凌晨 01:00 触发一次检查（UTC 时间 17:00）
    - cron: '0 17 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: '强制立即备份（忽略15天间隔）'
        required: true
        default: false
        type: boolean

jobs:
  backup-job:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 显示当前时间（调试）
        run: |
          echo "UTC时间: $(date -u)"
          echo "北京时间: $(TZ='Asia/Shanghai' date)"

      - name: 检出代码
        uses: actions/checkout@v5   # 升级至 v5，支持 Node.js 24
        with:
          fetch-depth: 0

      - name: 设置 Python
        uses: actions/setup-python@v6   # 升级至 v6，支持 Node.js 24
        with:
          python-version: '3.10'

      - name: 运行备份脚本
        env:
          FORCE_BACKUP: ${{ github.event.inputs.force == 'true' && 'true' || '' }}
        run: python auto_backup.py

      - name: 提交并推送备份
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          mkdir -p backup
          git add backup/
          if git diff --staged --quiet; then
            echo "没有检测到备份更新，跳过提交。"
          else
            git commit -m "Auto Backup: $(date +'%Y-%m-%d %H:%M:%S') [skip ci]"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin ${{ github.ref_name }}
          fi
